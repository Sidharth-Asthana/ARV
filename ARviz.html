<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#05060c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARviz">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>ARviz</title>
<style>
  :root{
    --ink:#e9ebf5; --muted:#9aa1b8; --glass:rgba(14,16,28,.55);
    --edge:rgba(255,255,255,.10); --r:22px;
  }
  html,body{height:100%;}
  body{
    margin:0; overflow:hidden; background:#05060c; color:var(--ink);
    font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  canvas{position:fixed; inset:0;}
  #bgc{z-index:0;} #cv{z-index:1; touch-action:none;}

  /* floating round buttons */
  .fabs{position:fixed; top:calc(env(safe-area-inset-top,0px) + 14px); right:14px; z-index:5;
        display:flex; flex-direction:column; gap:10px;}
  .fab{
    width:46px; height:46px; border-radius:50%; border:1px solid var(--edge);
    background:var(--glass); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    display:flex; align-items:center; justify-content:center; color:var(--ink);
    cursor:pointer; transition:transform .15s ease;
  }
  .fab:active{transform:scale(.9);}
  .fab svg{width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:1.8;
           stroke-linecap:round; stroke-linejoin:round;}

  /* translucent settings sheet */
  #sheet{
    position:fixed; left:12px; right:12px; z-index:4;
    bottom:calc(env(safe-area-inset-bottom,0px) + 12px);
    background:var(--glass); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    border:1px solid var(--edge); border-radius:var(--r);
    padding:16px 18px 18px; display:flex; flex-direction:column; gap:13px;
    max-width:520px; margin-inline:auto;
    max-height:min(62dvh,540px); overflow-y:auto; -webkit-overflow-scrolling:touch;
    transition:transform .35s cubic-bezier(.3,.9,.3,1), opacity .3s;
    touch-action:pan-y;
  }
  #sheet.hidden{transform:translateY(calc(100% + 40px)); opacity:0; pointer-events:none;}
  .brand{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .brand b{font-size:15px; font-weight:650; letter-spacing:.02em;}
  .brand span{font-size:11px; color:var(--muted);}
  #follow{margin-left:auto; font-variant-numeric:tabular-nums;}
  .lbl{font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted); margin-bottom:7px;}
  .row{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{
    height:32px; padding:0 13px; border-radius:999px; border:1px solid var(--edge);
    background:rgba(255,255,255,.05); color:var(--ink); font-size:12.5px; font-weight:550;
    display:flex; align-items:center; gap:7px; cursor:pointer;
    transition:background .2s, border-color .2s; font-family:inherit;
  }
  .chip.on{background:rgba(255,255,255,.16); border-color:rgba(255,255,255,.35);}
  .dot{width:14px; height:14px; border-radius:50%; flex:none;}
  .swatch{width:44px; height:44px; padding:0; border-radius:16px; border:1px solid var(--edge);
          cursor:pointer; transition:transform .15s, border-color .2s; background-size:cover; overflow:hidden;}
  .swatch.on{border:2px solid rgba(255,255,255,.9); transform:scale(1.07);}
  .sliders{display:flex; flex-direction:column; gap:9px;}
  .sl{display:flex; align-items:center; gap:12px; font-size:12px; color:var(--muted);}
  .sl span{width:74px; flex:none;}
  input[type=range]{-webkit-appearance:none; appearance:none; flex:1; height:26px;
                    background:transparent; cursor:pointer;}
  input[type=range]::-webkit-slider-runnable-track{height:5px; border-radius:999px; background:rgba(255,255,255,.14);}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:20px; height:20px;
    border-radius:50%; background:#e9ebf5; margin-top:-7.5px; border:none;}
  input[type=range]::-moz-range-track{height:5px; border-radius:999px; background:rgba(255,255,255,.14);}
  input[type=range]::-moz-range-thumb{width:20px; height:20px; border-radius:50%; background:#e9ebf5; border:none;}

  #toast{
    position:fixed; left:50%; transform:translateX(-50%) translateY(8px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 20px); z-index:9;
    background:rgba(20,22,36,.85); backdrop-filter:blur(12px);
    border:1px solid var(--edge); border-radius:999px; padding:10px 18px;
    font-size:12.5px; opacity:0; transition:opacity .3s, transform .3s;
    pointer-events:none; max-width:82vw; text-align:center;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  @media (prefers-reduced-motion:reduce){ #sheet,#toast,.fab{transition:none;} }
</style>
</head>
<body>

<canvas id="bgc"></canvas>
<canvas id="cv"></canvas>

<div class="fabs">
  <button class="fab" id="fsBtn" aria-label="Fullscreen">
    <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
  </button>
  <button class="fab" id="gearBtn" aria-label="Toggle settings">
    <svg viewBox="0 0 24 24"><path d="M4 8h10M18 8h2M4 16h4M12 16h8"/><circle cx="16" cy="8" r="2.2"/><circle cx="10" cy="16" r="2.2"/></svg>
  </button>
</div>

<div id="sheet">
  <div class="brand"><b>ARviz</b><span id="hint">tap the scene to interact</span><span id="follow"></span></div>
  <div>
    <div class="lbl">Mode</div>
    <div class="row" id="modeRow"></div>
  </div>
  <div>
    <div class="lbl">Audio source</div>
    <div class="row" id="srcRow">
      <button class="chip on" data-src="demo">Demo beat</button>
      <button class="chip" data-src="mic">Listen (mic)</button>
    </div>
  </div>
  <div>
    <div class="lbl">Flow direction</div>
    <div class="row" id="flowRow">
      <button class="chip on" data-flow="1">Forward &#8594;</button>
      <button class="chip" data-flow="-1">&#8592; Reverse</button>
    </div>
  </div>
  <div>
    <div class="lbl">Color cycle</div>
    <div class="row" id="palRow"></div>
  </div>
  <div>
    <div class="lbl">Scenery</div>
    <div class="row" id="bgRow"></div>
  </div>
  <div class="sliders">
    <div class="sl"><span>Sensitivity</span><input type="range" id="sens" min="30" max="200" value="100"></div>
    <div class="sl"><span>Density</span><input type="range" id="dens" min="0" max="100" value="55"></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
const $=s=>document.querySelector(s);
const cv=$('#cv'), ctx=cv.getContext('2d');
const bgc=$('#bgc'), bctx=bgc.getContext('2d');
let W=0,H=0,DPR=1;

let toastT=0;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);
}
/* rate-limited haptics shared by every interaction */
let lastBuzz=0;
function buzz(pattern){
  const n=performance.now();
  if(n-lastBuzz<70)return;
  lastBuzz=n;
  if(navigator.vibrate)try{navigator.vibrate(pattern);}catch(_){}
}

/* =============== color cycles ===============
   each scheme is an explicit color list; entities cycle smoothly
   through the list over time, and the settings chips are built
   from the exact same list, so panel and canvas always match. */
const PALETTES=[
  {name:'Aurora', cols:['#38f5a6','#2ce0d2','#5f7cff','#a05cff','#4ecf8e']},
  {name:'Ember',  cols:['#ffd23f','#cc7722','#ff7a1a','#e63b2e','#ff9d2e']},
  {name:'Ocean',  cols:['#eef7ff','#9fd0ff','#2ad4ff','#7fffd4','#2b4bc4']},
  {name:'Candy',  cols:['#ff5cd0','#ff4d6d','#ff9ecb','#c44dff','#ff6ea9']},
  {name:'Spectrum',cols:['#ff4646','#ffc93c','#3cf58a','#3cc8ff','#9b4dff']},
];
for(const p of PALETTES){
  p.rgb=p.cols.map(c=>[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]);
  p.grad=`conic-gradient(${[...p.cols,p.cols[0]].join(',')})`;
}
let pal=PALETTES[0], palManual=false;
const CYCLE_SPEED=.03;            // full trip through the color list ~33s
let lightScene=false;
function colorAt(f,t,alpha){       // f = entity offset 0..1, cycles with time
  const n=pal.rgb.length;
  const p=(((f+t*CYCLE_SPEED)%1)+1)%1*n;
  const i=Math.floor(p)%n, fr=p-Math.floor(p);
  const a=pal.rgb[i], b=pal.rgb[(i+1)%n];
  let r=a[0]+(b[0]-a[0])*fr, g=a[1]+(b[1]-a[1])*fr, bl=a[2]+(b[2]-a[2])*fr;
  if(lightScene){ r*=.5; g*=.5; bl*=.5; }   // keep colors visible on light scenery
  return `rgba(${r|0},${g|0},${bl|0},${alpha})`;
}

/* =============== sceneries ===============
   the static painting goes on a background canvas once; each scenery
   also has an ambient() layer drawn live every frame — kept faint so
   it feels alive without competing with the visualizer. */
function lcg(seed){ let s=seed>>>0||1; return ()=>((s=s*1664525+1013904223>>>0)/4294967296); }
function ridge(c,w,h,yFrac,ampFrac,color,seed,pts=48){
  const R=lcg(seed), a=R()*6, b=R()*6, f1=1.2+R()*1.6, f2=3+R()*3;
  const yBase=h*yFrac, amp=h*ampFrac;
  c.fillStyle=color; c.beginPath(); c.moveTo(-2,h+2);
  for(let i=0;i<=pts;i++){
    const fx=i/pts;
    const y=yBase-(Math.sin(fx*f1*Math.PI+a)*.62+Math.sin(fx*f2*Math.PI+b)*.38)*amp;
    c.lineTo(fx*w,y);
  }
  c.lineTo(w+2,h+2); c.closePath(); c.fill();
}
function twinkle(c,t,w,h,yMax,n,seed,alpha,col='226,232,255'){
  const R=lcg(seed);
  for(let i=0;i<n;i++){
    const x=R()*w, y=R()*h*yMax, r=.4+R()*1.1, base=.25+R()*.5, sp=.4+R()*1.6, ph=R()*7;
    c.fillStyle=`rgba(${col},${alpha*base*(.55+.45*Math.sin(t*sp+ph))})`;
    c.beginPath(); c.arc(x,y,r,0,7); c.fill();
  }
}
function vGrad(c,w,h,stops){
  const g=c.createLinearGradient(0,0,0,h);
  for(const [o,col] of stops)g.addColorStop(o,col);
  c.fillStyle=g; c.fillRect(0,0,w,h);
}
function glow(c,x,y,r,col){
  const g=c.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,col); g.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=g; c.fillRect(x-r,y-r,r*2,r*2);
}
function auroraRibbons(c,t,w,h){
  for(let i=0;i<3;i++){
    const breathe=.7+.3*Math.sin(t*.4+i*2.1);
    const g=c.createLinearGradient(0,h*(.08+i*.09),0,h*(.3+i*.09));
    const col=i===1?`rgba(120,90,255,${.10*breathe})`:`rgba(60,245,150,${.12*breathe})`;
    g.addColorStop(0,'rgba(60,245,150,0)');
    g.addColorStop(.5,col);
    g.addColorStop(1,'rgba(60,245,150,0)');
    c.fillStyle=g;
    c.beginPath(); c.moveTo(0,h*(.30+i*.06));
    for(let j=0;j<=32;j++){const fx=j/32;
      c.lineTo(fx*w,h*(.20+i*.07)+Math.sin(fx*4+i*2+t*.25)*h*.05);}
    for(let j=32;j>=0;j--){const fx=j/32;
      c.lineTo(fx*w,h*(.30+i*.07)+Math.sin(fx*4+i*2+t*.25)*h*.05);}
    c.closePath(); c.fill();
  }
}
function shootingStar(c,t,w,h,period,seed){
  const cyc=Math.floor(t/period), ph=(t%period)/period;
  if(ph>.06)return;
  const R=lcg(seed+cyc), p=ph/.06;
  const x0=w*(.1+R()*.7), y0=h*(.06+R()*.2);
  const x=x0+p*w*.16, y=y0+p*h*.07;
  const g=c.createLinearGradient(x,y,x-w*.05,y-h*.022);
  g.addColorStop(0,`rgba(235,240,255,${.7*(1-p)})`); g.addColorStop(1,'rgba(235,240,255,0)');
  c.strokeStyle=g; c.lineWidth=1.4; c.lineCap='round';
  c.beginPath(); c.moveTo(x,y); c.lineTo(x-w*.05,y-h*.022); c.stroke();
}
const SCENERIES=[
  {name:'Night Peaks', light:false, z0:.10, z1:.58, fx:.5, fy:.34, defPal:'Aurora',
   draw(c,w,h){
     vGrad(c,w,h,[[0,'#0a0f22'],[.6,'#070a16'],[1,'#04050b']]);
     ridge(c,w,h,.80,.10,'#0a0c17',21);
     ridge(c,w,h,.88,.07,'#060712',22);
   },
   ambient(c,t,w,h){
     twinkle(c,t,w,h,.55,Math.round(w*h/9000),7,1);
     shootingStar(c,t,w,h,9,101);
   }},
  {name:'Moonlit Sea', light:false, z0:.42, z1:.78, fx:.72, fy:.26, defPal:'Ocean',
   draw(c,w,h){
     vGrad(c,w,h,[[0,'#08111f'],[.6,'#0a1524'],[.62,'#061019'],[1,'#03080e']]);
     glow(c,w*.72,h*.26,h*.16,'rgba(220,230,250,.55)');
     c.fillStyle='#e8edf8'; c.beginPath(); c.arc(w*.72,h*.26,h*.035,0,7); c.fill();
   },
   ambient(c,t,w,h){
     twinkle(c,t,w,h,.5,Math.round(w*h/14000),11,.8);
     const cx=((t*5)%(w*1.5))-w*.25;   // cloud wisp drifting past the moon
     glow(c,cx,h*.21,h*.09,'rgba(200,212,238,.05)');
     glow(c,cx+w*.08,h*.24,h*.07,'rgba(200,212,238,.04)');
     for(let i=0;i<7;i++){ // moon glint shimmering on the water
       const y=h*(.64+i*.045), sh=.5+.5*Math.sin(t*(1+i*.31)+i*2.6);
       c.fillStyle=`rgba(210,225,250,${.14*sh*(1-i/8)})`;
       const gw=w*(.05+.02*Math.sin(t*.7+i));
       c.beginPath();
       (c.roundRect?c.roundRect(w*.72-gw/2,y,gw,2,1):c.rect(w*.72-gw/2,y,gw,2));
       c.fill();
     }
   }},
  {name:'Desert Dusk', light:false, z0:.24, z1:.62, fx:.5, fy:.52, defPal:'Ember',
   draw(c,w,h){
     vGrad(c,w,h,[[0,'#241026'],[.55,'#43181f'],[.75,'#1c0a0c'],[1,'#0d0507']]);
     glow(c,w*.5,h*.66,h*.3,'rgba(255,140,60,.30)');
     ridge(c,w,h,.78,.05,'#170a0d',31,32);
     ridge(c,w,h,.87,.05,'#0c0508',32,32);
   },
   ambient(c,t,w,h){ // the dusk glow slowly breathes; drifting dust motes
     glow(c,w*.5,h*.66,h*(.26+.04*Math.sin(t*.6)),`rgba(255,140,60,${.10+.05*Math.sin(t*.6)})`);
     twinkle(c,t*.6,w,h,.7,10,33,.35,'255,190,130');
   }},
  {name:'Aurora Pines', light:false, z0:.08, z1:.52, fx:.5, fy:.30, defPal:'Aurora',
   draw(c,w,h){
     vGrad(c,w,h,[[0,'#041018'],[.6,'#06131f'],[1,'#030910']]);
     ridge(c,w,h,.90,.055,'#040a0c',43,90);
   },
   ambient(c,t,w,h){
     twinkle(c,t,w,h,.6,Math.round(w*h/11000),41,.9);
     auroraRibbons(c,t,w,h);
   }},
  {name:'City Nights', light:false, z0:.12, z1:.58, fx:.5, fy:.38, defPal:'Candy',
   draw(c,w,h,store){
     vGrad(c,w,h,[[0,'#0b0d1e'],[.65,'#141031'],[1,'#080617']]);
     glow(c,w*.5,h*.78,h*.34,'rgba(120,90,255,.14)');
     const R=lcg(53); let x=-10; const flick=[];
     while(x<w+10){
       const bw=w*(.05+R()*.08), bh=h*(.08+R()*.16), y=h*.86-bh;
       c.fillStyle='#070812';
       c.beginPath();
       (c.roundRect?c.roundRect(x,y,bw,bh+h*.2,[bw*.18,bw*.18,0,0]):c.rect(x,y,bw,bh+h*.2));
       c.fill();
       for(let i=0,nw=Math.floor(bh*bw/240);i<nw;i++){
         const wx=x+bw*.15+R()*bw*.7, wy=y+bh*.1+R()*bh*.8;
         c.fillStyle=`rgba(255,214,140,${.25+R()*.5})`;
         c.fillRect(wx,wy,1.3,1.8);
         if(i%4===0)flick.push([wx,wy]);
       }
       x+=bw+w*.012;
     }
     if(store)this._flick=flick;
   },
   ambient(c,t,w,h){
     twinkle(c,t,w,h,.35,Math.round(w*h/16000),51,.7);
     if(!this._flick)return;
     for(const [i,[x,y]] of this._flick.entries()){ // a few windows flicker
       c.fillStyle=`rgba(255,214,140,${.2+.55*(.5+.5*Math.sin(t*(1.2+i%3)+i*2.7))})`;
       c.fillRect(x,y,1.3,1.8);
     }
   }},
  {name:'Forest Glade', light:false, z0:.12, z1:.62, fx:.5, fy:.40, defPal:'Aurora',
   draw(c,w,h){
     vGrad(c,w,h,[[0,'#06130c'],[.7,'#04100a'],[1,'#020806']]);
     const R=lcg(71);
     for(let i=0;i<6;i++){ // rounded tree trunks at the glade's edge
       const tx=w*(.04+i*.17+R()*.06), tw=w*(.018+R()*.02), th=h*(.5+R()*.25);
       c.fillStyle=i%2?'#031008':'#040d09';
       c.beginPath();
       (c.roundRect?c.roundRect(tx,h-th,tw,th+4,tw*.5):c.rect(tx,h-th,tw,th+4));
       c.fill();
     }
     ridge(c,w,h,.86,.05,'#03100a',72,60);
     ridge(c,w,h,.93,.04,'#020a06',73,60);
   },
   ambient(c,t,w,h){
     for(let i=0;i<2;i++){ // fog banks sliding between the trunks
       const x=((t*(4+i*2.5)+i*w*.7)%(w+w*.6))-w*.3;
       glow(c,x,h*(.7+i*.1),h*.13,'rgba(170,215,190,.045)');
     }
     twinkle(c,t,w,h,.35,12,74,.5);                       // canopy starlight
     twinkle(c,t*.8,w,h,.95,8,75,.4,'150,240,180');       // ground glints
   }},
  {name:'Sakura Dusk', light:false, z0:.16, z1:.60, fx:.32, fy:.54, defPal:'Candy',
   draw(c,w,h){
     vGrad(c,w,h,[[0,'#2a1430'],[.55,'#3d1d3b'],[.8,'#241224'],[1,'#150a16']]);
     glow(c,w*.32,h*.7,h*.26,'rgba(255,150,170,.22)');
     ridge(c,w,h,.84,.05,'#1a0d1c',81,40);
     // blossom branch reaching in from the top right
     const R=lcg(83);
     c.strokeStyle='#160a16'; c.lineCap='round';
     for(let b=0;b<3;b++){
       c.lineWidth=(3-b)*2.2;
       c.beginPath(); c.moveTo(w*1.02,h*(.02+b*.05));
       c.quadraticCurveTo(w*(.8-b*.06),h*(.08+b*.06),w*(.62-b*.1),h*(.16+b*.05));
       c.stroke();
       for(let i=0;i<9;i++){
         const fr=i/9, bx=w*(1.0-fr*(.38+b*.1)), by=h*(.03+b*.05+fr*(.12+b*.02))+R()*8-4;
         c.fillStyle=`rgba(255,${168+R()*40|0},${195+R()*30|0},${.35+R()*.35})`;
         c.beginPath(); c.arc(bx,by,1.6+R()*2.4,0,7); c.fill();
       }
     }
   },
   ambient(c,t,w,h){
     glow(c,w*.32,h*.7,h*(.22+.03*Math.sin(t*.5)),'rgba(255,150,170,.10)');
     const R=lcg(85);
     for(let i=0;i<6;i++){ // stray petals sifting down from the branch
       const sp=10+R()*12, ph=R()*h, x=(w*(.6+R()*.4)+Math.sin(t*.8+i*2)*w*.04);
       const y=((t*sp+ph)%(h*1.1))-h*.05;
       c.fillStyle=`rgba(255,180,205,${.28*(1-y/h)+.06})`;
       c.beginPath(); c.ellipse(x,y,2.6,1.5,t+i,0,7); c.fill();
     }
   }},
  {name:'Rainfall', light:false, z0:.12, z1:.60, fx:.5, fy:.35, defPal:'Ocean',
   draw(c,w,h){
     vGrad(c,w,h,[[0,'#0d1420'],[.6,'#111a29'],[1,'#080d15']]);
     glow(c,w*.5,h*.2,h*.3,'rgba(150,175,215,.07)');
     ridge(c,w,h,.80,.06,'#0a111c',91);
     ridge(c,w,h,.89,.05,'#060b12',92);
   },

  {name:'Morning Mist', light:true, z0:.20, z1:.62, fx:.68, fy:.30, defPal:'Ember',

let scen=SCENERIES[0];
function paintScene(){
  bctx.setTransform(DPR,0,0,DPR,0,0);
  scen.draw(bctx,W,H,true);
  lightScene=scen.light;
}
function setScene(s){

  if(!palManual){ // scenery brings its own palette unless the user chose one

/* =============== audio engine ===============
   the mic path listens per instrument group: onset detection runs
   independently on drums (low), keys/strums (mid), and percussion
   (high). A conductor scores each band for salience and rhythmic
   regularity and elects a LEAD instrument — major reactions follow
   the lead's beat, the runner-up only adds minor accents. Slow songs
   lower the onset threshold (hear soft piano strokes) but soften the
   reactions; fast songs demand hard hits and jolt harder. */
const BAND_DEFS=[
  {name:'drums',      lo:1,  hi:10,  floor:.012},
  {name:'keys',       lo:10, hi:60,  floor:.008},
  {name:'percussion', lo:60, hi:220, floor:.010},
];
const audio={
  mode:'demo', bass:0, mid:0, treb:0, level:0,
  onBeat:false, beatAmp:0, beatGlow:0, shimmer:0, onShimmer:false,
  ac:null, an:null, buf:null, prev:null, lastBeat:0, lastShim:0,
  ivs:[], bpm:118, energyAvg:.4, pace:.5, peak:.3,
  bands:BAND_DEFS.map(b=>({...b,hist:[],sal:0,ivs:[],lastOn:-9,onset:false,strength:0})),
  lead:0, second:1, evalAt:0,
};
function followLabel(){
  $('#follow').textContent = audio.mode==='mic'
    ? `following ${audio.bands[audio.lead].name} · ${Math.round(audio.bpm)} bpm`
    : `demo beat · 118 bpm`;
}
async function startMic(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false}});
    audio.ac=audio.ac||new (window.AudioContext||window.webkitAudioContext)();
    await audio.ac.resume();
    const src=audio.ac.createMediaStreamSource(stream);
    audio.an=audio.ac.createAnalyser(); audio.an.fftSize=1024; audio.an.smoothingTimeConstant=.65;
    src.connect(audio.an);
    audio.buf=new Uint8Array(audio.an.frequencyBinCount);
    audio.prev=new Uint8Array(audio.an.frequencyBinCount);
    audio.mode='mic'; audio.ivs.length=0; audio.peak=.3;
    for(const bd of audio.bands){bd.hist.length=0; bd.ivs.length=0; bd.sal=0; bd.lastOn=-9;}
    toast('Listening — play YouTube Music out loud nearby');
    followLabel();
    return true;
  }catch(e){
    toast('Microphone not available — demo beat continues');
    return false;
  }
}
function band(lo,hi){
  let s=0; for(let i=lo;i<hi;i++)s+=audio.buf[i];
  return s/((hi-lo)*255);
}
function registerBeat(t,amp){
  // intensity rides pace: gentle swells on slow songs, hard jolts on fast ones
  audio.onBeat=true;
  audio.beatAmp=Math.min(1,amp*(.5+audio.pace*.9));
  audio.beatGlow=1;
  const iv=t-audio.lastBeat;
  if(iv>.24&&iv<2){
    audio.ivs.push(iv); if(audio.ivs.length>12)audio.ivs.shift();
    const s=[...audio.ivs].sort((a,b)=>a-b);
    audio.bpm=60/s[Math.floor(s.length/2)];
  }
  audio.lastBeat=t;
}
function conductor(t){
  if(t<audio.evalAt)return;
  audio.evalAt=t+3;
  const scores=audio.bands.map(bd=>{
    if(bd.sal<1e-4)return 0;
    let reg=.3, plaus=.6;
    if(bd.ivs.length>=3){
      const m=bd.ivs.reduce((a,x)=>a+x,0)/bd.ivs.length;
      const cv=Math.sqrt(bd.ivs.reduce((a,x)=>a+(x-m)*(x-m),0)/bd.ivs.length)/m;
      reg=1/(1+cv*2);
      const rate=1/m;
      plaus=(rate>.3&&rate<5)?1:.5;
    }
    return bd.sal*(.4+.8*reg)*plaus;
  });
  let best=0; scores.forEach((s,i)=>{if(s>scores[best])best=i;});
  if(best!==audio.lead&&scores[best]>scores[audio.lead]*1.3){
    audio.lead=best;
    toast(`Following ${audio.bands[best].name}`);
  }
  let sec=(audio.lead+1)%3;
  audio.bands.forEach((_,i)=>{ if(i!==audio.lead&&scores[i]>scores[sec])sec=i; });
  audio.second=sec;
  followLabel();
}
let demoBeatIdx=-1;
function updateAudio(t,dt,sens){
  audio.onBeat=false; audio.onShimmer=false;
  audio.beatGlow*=.92; audio.shimmer*=.88;
  if(audio.mode==='mic'&&audio.an){
    audio.an.getByteFrequencyData(audio.buf);
    // spectral flux per instrument band (positive change only)
    const flux=[0,0,0];
    for(let i=1;i<220;i++){
      const d=audio.buf[i]-audio.prev[i];
      if(d>0){ if(i<10)flux[0]+=d; else if(i<60)flux[1]+=d; else flux[2]+=d; }
    }
    audio.prev.set(audio.buf);
    flux[0]/=9*255; flux[1]/=50*255; flux[2]/=160*255;
    const b=band(1,10), m=band(10,60), tr=band(60,220);
    // auto-gain: normalise against a slowly-decaying loudness peak
    const rawLev=b*.55+m*.3+tr*.15;
    audio.peak=Math.max(audio.peak*.9985,rawLev,.05);
    const agc=Math.min(6,.75/audio.peak)*sens;
    // slow songs smooth the envelopes; fast songs snap
    const ease=.2+.22*audio.pace;
    audio.bass+=(Math.min(1,b*agc)-audio.bass)*(ease+.1);
    audio.mid +=(Math.min(1,m*agc)-audio.mid)*ease;
    audio.treb+=(Math.min(1,tr*agc)-audio.treb)*ease;
    audio.level=Math.min(1,audio.bass*.55+audio.mid*.3+audio.treb*.15);
    // per-band onset detection with pace-scaled threshold:
    // low pace -> more sensitive trigger; high pace -> only strong hits
    const k=1.3+audio.pace*1.0, gate=audio.level>.07;
    for(const bd of audio.bands){
      bd.onset=false;
      const f=flux[audio.bands.indexOf(bd)];
      bd.hist.push(f); if(bd.hist.length>45)bd.hist.shift();
      const n=bd.hist.length;
      const mean=bd.hist.reduce((a,x)=>a+x,0)/n;
      const std=Math.sqrt(bd.hist.reduce((a,x)=>a+(x-mean)*(x-mean),0)/n)||1e-4;
      if(n>20&&gate&&f>mean+k*std&&f>bd.floor&&t-bd.lastOn>.18){
        bd.onset=true;
        bd.strength=Math.min(1,.4+(f-mean)/(std*4+1e-4)*.3);
        const iv=t-bd.lastOn;
        if(iv>.2&&iv<2.5){bd.ivs.push(iv); if(bd.ivs.length>8)bd.ivs.shift();}
        bd.lastOn=t;
        bd.sal+=(f-bd.sal)*.35;
      }else bd.sal*=Math.pow(.985,dt*60);
    }
    conductor(t);
    // major reaction: the lead instrument's beat
    const lead=audio.bands[audio.lead];
    if(lead.onset&&t-audio.lastBeat>.22)registerBeat(t,lead.strength);
    else if(audio.ivs.length>=4){
      // tempo grid: if the expected beat never surfaced, pulse softly on time
      const iv=60/audio.bpm;
      if(t-audio.lastBeat>iv*1.12&&audio.level>.12){
        audio.onBeat=true;
        audio.beatAmp=.4*Math.min(1,audio.level*1.6)*(.5+audio.pace*.9);
        audio.beatGlow=Math.max(audio.beatGlow,.55);
        audio.lastBeat+=iv;     // stay phase-locked, don't retime the grid
      }
    }
    // minor reaction: the runner-up instrument only accents
    const sec=audio.bands[audio.second];
    if(sec.onset&&t-audio.lastShim>.15&&t-audio.lastBeat>.06){
      audio.shimmer=Math.min(1,.5+sec.strength*.5);
      audio.onShimmer=true; audio.lastShim=t;
    }
  }else{
    const bpm=118, ph=t*bpm/60, idx=Math.floor(ph);
    const sect=.55+.45*Math.abs(Math.sin(idx/8));
    if(idx!==demoBeatIdx){
      demoBeatIdx=idx;
      if(Math.sin(idx*12.9898)*43758.5453%1>-0.75){
        registerBeat(t,.7+.3*sect);
        if(idx%2)audio.shimmer=1, audio.onShimmer=true;
      }
    }
    const env=Math.exp(-(ph%1)*6);
    audio.bass=Math.min(1,(env*.85+.06)*sect*sens);
    audio.mid =Math.min(1,(.28+.2*Math.sin(t*.9)+.12*Math.sin(t*3.7))*sect*sens);
    audio.treb=Math.min(1,(.18+.14*Math.sin(t*5.3+1))*sect*sens);
    audio.level=Math.min(1,audio.bass*.55+audio.mid*.3+audio.treb*.15);
  }
  /* tempo + energy -> pace: slow songs ease gently, fast songs jolt hard */
  audio.energyAvg+=(audio.level-audio.energyAvg)*.01;
  const paceT=Math.max(0,Math.min(1,(audio.bpm-70)/95*.55+audio.energyAvg*.75));
  audio.pace+=(paceT-audio.pace)*.02;
}

/* =============== shared state =============== */
let flow=1;                          // 1 forward, -1 reverse
let density=.55;                     // 0..1 from slider
let zoom=1;                          // pinch scale, .5..1.8
const zoneY=()=>[scen.z0*H,scen.z1*H];
const rnd=Math.random;

/* adaptive performance: thin the load if a device can't hold ~50fps */
const perf={q:1,acc:0,frames:0};
function tickPerf(dt){
  perf.acc+=dt; perf.frames++;
  if(perf.acc>=2){
    const fps=perf.frames/perf.acc; perf.acc=0; perf.frames=0;
    if(fps<47)perf.q=Math.max(.4,perf.q-.15);
    else if(fps>56)perf.q=Math.min(1,perf.q+.06);
  }
}
const glowOK=()=>perf.q>=.7;

/* =============== mode: particles =============== */
const mParticles={
  name:'Particles', hint:'tap to burst · drag to stir',
  P:[], BURST:[], RINGS:[],
  count(){ return Math.round((50+density*190)*perf.q); },
  reset(){
    this.P.length=0; this.BURST.length=0; this.RINGS.length=0;
    const [y0,y1]=zoneY();
    for(let i=0,n=this.count();i<n;i++)
      this.P.push({x:rnd()*W,y:y0+rnd()*(y1-y0),vx:0,vy:0,f:rnd(),sz:.6+rnd()*1.7,ph:rnd()*7});
  },
  tap(x,y){
    const n=34;
    for(let i=0;i<n;i++){
      const a=Math.PI*2*i/n+rnd()*.3, sp=2.2+rnd()*4.5;
      this.BURST.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,f:rnd(),sz:1+rnd()*2});
    }
    this.RINGS.push({x,y,r:6,life:1});
  },
  drag(x,y,dx,dy){
    const R=100;
    for(const p of this.P){
      const d=Math.hypot(p.x-x,p.y-y);
      if(d<R){const k=(1-d/R)*.32; p.vx+=dx*k; p.vy+=dy*k;}
    }
  },
  step(dt,t){
    const [y0,y1]=zoneY(), pace=audio.pace;
    const n=this.count();
    while(this.P.length<n)this.P.push({x:rnd()*W,y:y0+rnd()*(y1-y0),vx:0,vy:0,f:rnd(),sz:.6+rnd()*1.7,ph:rnd()*7});
    this.P.length=Math.min(this.P.length,n);
    const drive=(.25+audio.bass*1.6)*(.5+pace), flowV=(.5+pace*1.4)*flow;
    let jolt=null;
    if(audio.onBeat){ // a cluster of particles gets a jolt on each beat
      jolt={x:rnd()*W, y:y0+rnd()*(y1-y0), r:W*.28,
            k:audio.beatAmp*(0.7+pace*1.9)};
    }
    for(const p of this.P){
      const nx=Math.sin(p.y*.006+t*.35+p.ph)*Math.cos(p.x*.004-t*.22);
      const ny=Math.cos(p.x*.006-t*.3+p.ph)*Math.sin(p.y*.004+t*.27);
      p.vx+=nx*.05*drive+(flowV-p.vx)*.015;
      p.vy+=ny*.05*drive;
      if(p.y<y0)p.vy+=(y0-p.y)*.0022;
      if(p.y>y1)p.vy-=(p.y-y1)*.0022;
      if(jolt){
        const dx=p.x-jolt.x, dy=p.y-jolt.y, d=Math.hypot(dx,dy);
        if(d<jolt.r){const s=jolt.k*(1-d/jolt.r)*2.4/(d||1); p.vx+=dx*s; p.vy+=dy*s;}
      }
      p.vx*=.94; p.vy*=.94;
      p.x+=p.vx*dt*60; p.y+=p.vy*dt*60;
      if(p.x<-12)p.x=W+12; if(p.x>W+12)p.x=-12;
    }
    for(let i=this.BURST.length-1;i>=0;i--){
      const b=this.BURST[i];
      b.x+=b.vx*dt*60; b.y+=b.vy*dt*60; b.vx*=.955; b.vy*=.955; b.life-=dt*(.7+pace*.6);
      if(b.life<=0)this.BURST.splice(i,1);
    }
    for(let i=this.RINGS.length-1;i>=0;i--){
      const r=this.RINGS[i]; r.r+=dt*(220+audio.bass*300); r.life-=dt*1.4;
      if(r.life<=0)this.RINGS.splice(i,1);
    }
  },
  draw(t){
    const halo=glowOK();
    for(const p of this.P){
      const r=p.sz*zoom*(1+audio.bass*1.6+audio.shimmer*.25);
      if(halo){
        ctx.fillStyle=colorAt(p.f,t,.10);
        ctx.beginPath(); ctx.arc(p.x,p.y,r*3.4,0,7); ctx.fill();
      }
      ctx.fillStyle=colorAt(p.f,t,.85);
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,7); ctx.fill();
    }
    for(const b of this.BURST){
      ctx.fillStyle=colorAt(b.f,t,b.life);
      ctx.beginPath(); ctx.arc(b.x,b.y,b.sz*(.5+b.life),0,7); ctx.fill();
    }
    ctx.lineWidth=1.5;
    for(const r of this.RINGS){
      ctx.strokeStyle=colorAt(.5,t,r.life*.6);
      ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke();
    }
  },
};

/* =============== mode: waves =============== */
const M=120;
const mWaves={
  name:'Waves', hint:'tap or drag to ripple · flick to set flow',
  lines:[], acc:0,
  count(){ return 3+Math.round(density*6); },   // 3..9 overlapping lines
  reset(){
    this.lines.length=0;
    const n=this.count();
    for(let i=0;i<n;i++)
      this.lines.push({f:n===1?.5:i/(n-1),u:new Float32Array(M),v:new Float32Array(M),
                       k:2+i%4,ph:rnd()*7,band:i%3});
  },
  tap(x,y){
    const fx=x/W, [y0,y1]=zoneY(), n=this.lines.length;
    for(const [li,l] of this.lines.entries()){
      const ly=y0+(y1-y0)*(li+.5)/n;
      const near=Math.exp(-Math.pow((y-ly)/(H*.18),2));
      const amp=H*.09*(.25+.75*near);
      for(let j=0;j<M;j++){
        const d=j/(M-1)-fx;
        l.u[j]+=amp*Math.exp(-d*d*160);
      }
    }
  },
  drag(x,y,dx,dy){ // pull the nearest lines with your finger
    const fx=x/W, [y0,y1]=zoneY(), n=this.lines.length;
    for(const [li,l] of this.lines.entries()){
      const ly=y0+(y1-y0)*(li+.5)/n;
      const near=Math.exp(-Math.pow((y-ly)/(H*.10),2));
      if(near<.02)continue;
      for(let j=0;j<M;j++){
        const d=j/(M-1)-fx;
        l.u[j]+=dy*near*.5*Math.exp(-d*d*220);
      }
    }
  },
  step(dt,t){
    if(this.lines.length!==this.count())this.reset();
    const pace=audio.pace;
    if(audio.onBeat){ // crests surge at a random spot; sharper when the music is fast
      const sig=160+pace*640, amp=H*.05*audio.beatAmp*(.5+pace*1.2);
      for(const l of this.lines){
        if(rnd()<.6){
          const fx=rnd();
          for(let j=0;j<M;j++){const d=j/(M-1)-fx; l.u[j]+=amp*Math.exp(-d*d*sig);}
        }
      }
    }
    // damped wave equation, fixed substeps for CFL stability
    this.acc=Math.min(this.acc+dt,.1);
    const h=1/240, c2=6400, damp=1.6+pace*1.6;
    while(this.acc>=h){
      this.acc-=h;
      for(const l of this.lines){
        const u=l.u,v=l.v;
        for(let j=1;j<M-1;j++)v[j]+=(c2*(u[j-1]+u[j+1]-2*u[j])-damp*v[j])*h;
        for(let j=1;j<M-1;j++)u[j]+=v[j]*h;
        u[0]=u[M-1]=0;
      }
    }
  },
  draw(t){
    const [y0,y1]=zoneY(), n=this.lines.length, pace=audio.pace;
    const bands=[audio.bass,audio.mid,audio.treb];
    ctx.lineCap='round'; ctx.lineJoin='round';
    for(const [li,l] of this.lines.entries()){
      const yc=y0+(y1-y0)*(li+.5)/n;
      const e=bands[l.band];
      const A=(6+e*H*.05)*(1+audio.beatGlow*.5)*zoom;
      const spd=(0.8+pace*2.2)*flow;
      ctx.strokeStyle=colorAt(l.f,t,.9);
      ctx.lineWidth=2+e*3+audio.shimmer;
      ctx.beginPath();
      for(let j=0;j<M;j++){
        const fx=j/(M-1), x=fx*W;
        const wave=Math.sin(fx*Math.PI*l.k-t*spd*(1+l.k*.3)+l.ph)*A;
        const y=yc+wave+l.u[j];
        j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
      if(glowOK()){
        ctx.strokeStyle=colorAt(l.f,t,.16);
        ctx.lineWidth=8+e*10;
        ctx.stroke();
      }
    }
  },
};

/* =============== mode: rings =============== */
const mRings={
  name:'Rings', hint:'tap to spike · pinch to resize · drag to spin',
  rings:[], spikes:[], rot:0,
  count(){ return 3+Math.round(density*4); },   // 3..7 rings
  reset(){
    this.rings.length=0; this.spikes.length=0;
    const n=this.count();
    for(let i=0;i<n;i++)this.rings.push({f:n===1?.5:i/(n-1),band:i%3,pulse:0});
  },
  center(){ return [scen.fx*W, scen.fy*H]; },
  baseR(i){ return Math.min(W,H)*(.10+.075*i)*zoom; },
  tap(x,y){
    const [cx,cy]=this.center();
    const d=Math.hypot(x-cx,y-cy), ang=Math.atan2(y-cy,x-cx);
    let best=0,bd=1e9;
    this.rings.forEach((r,i)=>{const e=Math.abs(d-this.baseR(i)); if(e<bd){bd=e;best=i;}});
    this.spikes.push({ring:best,ang,amp:Math.min(W,H)*.09,w:.5,life:1});
    this.rings[best].pulse=1;
  },
  drag(x,y,dx,dy){ this.rot+=dx*.004; },
  step(dt,t){
    if(this.rings.length!==this.count())this.reset();
    const pace=audio.pace;
    this.rot+=dt*flow*(.15+audio.level*.8);
    if(audio.onBeat){ // spikes appear at random points along the circumference
      const k=1+Math.round(pace*4);
      for(let i=0;i<k;i++)
        this.spikes.push({ring:Math.floor(rnd()*this.rings.length),ang:rnd()*Math.PI*2,
                          amp:Math.min(W,H)*(.03+.06*audio.beatAmp*(0.4+pace)),
                          w:.6-pace*.35,life:1});
    }
    if(audio.onShimmer) // minor-instrument accents nick the rims
      this.spikes.push({ring:Math.floor(rnd()*this.rings.length),ang:rnd()*Math.PI*2,
                        amp:Math.min(W,H)*.02,w:.18,life:.7});
    for(let i=this.spikes.length-1;i>=0;i--){
      const s=this.spikes[i]; s.life-=dt*(1+pace*1.6);
      if(s.life<=0)this.spikes.splice(i,1);
    }
    for(const r of this.rings)r.pulse*=.93;
  },
  draw(t){
    const [cx,cy]=this.center();
    const bands=[audio.bass,audio.mid,audio.treb];
    ctx.lineCap='round'; ctx.lineJoin='round';
    const SEG=96;
    for(const [i,r] of this.rings.entries()){
      const e=bands[r.band];
      const R=this.baseR(i)*(1+e*.22+r.pulse*.12); // radius breathes with its band
      ctx.strokeStyle=colorAt(r.f,t,.9);
      ctx.lineWidth=2+e*3.5+audio.shimmer;
      ctx.beginPath();
      for(let s=0;s<=SEG;s++){
        const a=s/SEG*Math.PI*2+this.rot;
        let rr=R;
        for(const sp of this.spikes){
          if(sp.ring!==i)continue;
          let d=a-sp.ang;
          d=Math.atan2(Math.sin(d),Math.cos(d));
          rr+=sp.amp*sp.life*Math.exp(-(d*d)/(sp.w*sp.w));
        }
        const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr;
        s===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
      if(glowOK()){
        ctx.strokeStyle=colorAt(r.f,t,.15);
        ctx.lineWidth=9+e*10;
        ctx.stroke();
      }
    }
  },
};

/* =============== mode: meteors =============== */
const mMeteors={
  name:'Meteors', hint:'tap for a cluster · flick to set flow',
  MS:[], spawnAcc:0, dragAcc:0,
  reset(){ this.MS.length=0; this.spawnAcc=0; },
  spawn(x,y,boost){
    const pace=audio.pace;
    const sp=(200+pace*300+rnd()*140)*(boost?1.3:1);
    this.MS.push({x,y,vx:flow*sp,vy:26+rnd()*46,f:rnd(),
                  len:(.06+audio.bass*.06+(boost?.05:0))*zoom,life:1,bright:boost?1:.7});
  },
  tap(x,y){
    for(let i=0,n=6+Math.round(rnd()*4);i<n;i++)
      this.spawn(x+(rnd()-.5)*40,y+(rnd()-.5)*70,true);
  },
  drag(x,y,dx,dy){ // sweep a trail of meteors under your finger
    this.dragAcc+=Math.hypot(dx,dy);
    if(this.dragAcc>26){ this.dragAcc=0; this.spawn(x,y,false); }
  },
  step(dt,t){
    const [y0,y1]=zoneY(), pace=audio.pace;
    const rate=(0.6+audio.level*4+pace*3)*(.3+density*1.4)*(.5+perf.q*.5);
    this.spawnAcc+=dt*rate;
    while(this.spawnAcc>=1){
      this.spawnAcc-=1;
      this.spawn(flow>0?-40:W+40, y0+rnd()*(y1-y0), false);
    }
    if(audio.onBeat)
      for(let i=0,k=2+Math.round(pace*4);i<k;i++)
        this.spawn(flow>0?-40:W+40, y0+rnd()*(y1-y0), true);
    for(let i=this.MS.length-1;i>=0;i--){
      const m=this.MS[i];
      m.x+=m.vx*dt; m.y+=m.vy*dt;
      if(m.x<-W*.2||m.x>W*1.2||m.y>H*1.1)this.MS.splice(i,1);
    }
  },
  draw(t){
    ctx.lineCap='round';
    for(const m of this.MS){
      const tx=m.x-m.vx*m.len, ty=m.y-m.vy*m.len;
      const g=ctx.createLinearGradient(m.x,m.y,tx,ty);
      const br=Math.min(1,m.bright+audio.shimmer*.2);
      g.addColorStop(0,colorAt(m.f,t,br));
      g.addColorStop(1,colorAt(m.f,t,0));
      ctx.strokeStyle=g; ctx.lineWidth=2.4;
      ctx.beginPath(); ctx.moveTo(m.x,m.y); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.fillStyle=colorAt(m.f,t,br);
      ctx.beginPath(); ctx.arc(m.x,m.y,1.8,0,7); ctx.fill();
    }
  },
};

/* =============== mode: fireflies =============== */
const mFlies={
  name:'Fireflies', hint:'tap to scatter · drag to lead the swarm',
  F:[], sync:0,
  count(){ return Math.round((16+density*64)*perf.q); },
  make(){
    const [y0,y1]=zoneY();
    return {x:rnd()*W,y:y0+rnd()*(y1-y0),vx:0,vy:0,f:rnd(),
            ph:rnd()*7,bl:rnd()*7,flare:0};
  },
  reset(){ this.F.length=0; this.sync=0;
    for(let i=0,n=this.count();i<n;i++)this.F.push(this.make()); },
  tap(x,y){ // startle the swarm near the tap
    for(const fl of this.F){
      const dx=fl.x-x, dy=fl.y-y, d=Math.hypot(dx,dy);
      if(d<150){const k=(1-d/150)*4.2/(d||1); fl.vx+=dx*k; fl.vy+=dy*k; fl.flare=1;}
    }
  },
  drag(x,y,dx,dy){ // the swarm is drawn toward a slow-moving finger
    for(const fl of this.F){
      const dxx=x-fl.x, dyy=y-fl.y, d=Math.hypot(dxx,dyy);
      if(d<170&&d>8){const k=.045*(1-d/170); fl.vx+=dxx*k; fl.vy+=dyy*k;}
    }
  },
  step(dt,t){
    const [y0,y1]=zoneY(), pace=audio.pace;
    const n=this.count();
    while(this.F.length<n)this.F.push(this.make());
    this.F.length=Math.min(this.F.length,n);
    this.sync*=.94;
    if(audio.onBeat)this.sync=Math.max(this.sync,audio.beatAmp); // swarm blinks together
    if(audio.onShimmer)
      for(let i=0;i<2;i++)this.F[Math.floor(rnd()*this.F.length)].flare=1;
    const wander=.04*(0.5+pace*.8);
    for(const fl of this.F){
      fl.vx+=Math.sin(t*.9+fl.ph)*wander+Math.sin(fl.y*.01+t*.4)*wander
             +(flow*.25-fl.vx)*.01;
      fl.vy+=Math.cos(t*.8+fl.ph*1.3)*wander;
      if(fl.y<y0)fl.vy+=(y0-fl.y)*.002;
      if(fl.y>y1)fl.vy-=(fl.y-y1)*.002;
      fl.vx*=.96; fl.vy*=.96;
      fl.x+=fl.vx*dt*60; fl.y+=fl.vy*dt*60;
      if(fl.x<-14)fl.x=W+14; if(fl.x>W+14)fl.x=-14;
      fl.flare*=.9;
    }
  },
  draw(t){
    const halo=glowOK();
    for(const fl of this.F){
      const blink=.3+.7*(.5+.5*Math.sin(t*(1.6+audio.pace)+fl.bl));
      const b=Math.min(1,Math.max(blink,this.sync,fl.flare));
      const r=(1.3+b*1.6)*zoom;
      if(halo){
        ctx.fillStyle=colorAt(fl.f,t,.14*b);
        ctx.beginPath(); ctx.arc(fl.x,fl.y,r*4,0,7); ctx.fill();
      }
      ctx.fillStyle=colorAt(fl.f,t,.25+.75*b);
      ctx.beginPath(); ctx.arc(fl.x,fl.y,r,0,7); ctx.fill();
    }
  },
};

/* =============== mode: petals =============== */
const mPetals={
  name:'Petals', hint:'tap for a gust · drag to steer the wind',
  P:[],
  count(){ return Math.round((14+density*50)*perf.q); },
  make(fresh){
    return {x:rnd()*W, y:fresh?-20-rnd()*40:rnd()*H,
            vx:0,vy:0,f:rnd(),sz:2.6+rnd()*2.6,
            rot:rnd()*7,vr:(rnd()-.5)*2,sway:rnd()*7,spark:0};
  },
  reset(){ this.P.length=0;
    for(let i=0,n=this.count();i<n;i++)this.P.push(this.make(false)); },
  tap(x,y){ // a gust bursts out from the tap
    for(const p of this.P){
      const dx=p.x-x, dy=p.y-y, d=Math.hypot(dx,dy);
      if(d<160){const k=(1-d/160)*5/(d||1);
        p.vx+=dx*k; p.vy+=dy*k-1.4*(1-d/160); p.vr+=(rnd()-.5)*8;}
    }
  },
  drag(x,y,dx,dy){ // steer the wind through the petals
    for(const p of this.P){
      const d=Math.hypot(p.x-x,p.y-y);
      if(d<140){const k=(1-d/140)*.25; p.vx+=dx*k; p.vy+=dy*k; p.vr+=dx*.01;}
    }
  },
  step(dt,t){
    const pace=audio.pace;
    const n=this.count();
    while(this.P.length<n)this.P.push(this.make(true));
    this.P.length=Math.min(this.P.length,n);
    if(audio.onBeat){ // beat = a gust rolls through
      const g=audio.beatAmp*(28+pace*70);
      for(const p of this.P){ p.vx+=flow*g*(.5+rnd()); p.vr+=(rnd()-.5)*4*audio.beatAmp; }
    }
    if(audio.onShimmer)
      for(let i=0;i<3;i++)this.P[Math.floor(rnd()*this.P.length)].spark=1;
    const fall=(16+pace*16), breeze=flow*(14+pace*36+audio.level*30);
    for(const p of this.P){
      p.vx+=(breeze+Math.sin(t*.8+p.sway)*12-p.vx)*.02;
      p.vy+=(fall+Math.sin(t*1.3+p.sway*2)*6-p.vy)*.03;
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.rot+=(p.vr+audio.level*1.2)*dt;
      p.vr*=.985; p.spark*=.92;
      if(p.y>H+24){ Object.assign(p,this.make(true)); }
      if(p.x<-24)p.x=W+24; if(p.x>W+24)p.x=-24;
    }
  },
  draw(t){
    const halo=glowOK();
    for(const p of this.P){
      const a=.55+.45*Math.min(1,p.spark+audio.beatGlow*.4);
      ctx.save();
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      const s=p.sz*zoom*(1+audio.bass*.35);
      if(halo&&p.spark>.2){
        ctx.fillStyle=colorAt(p.f,t,.2*p.spark);
        ctx.beginPath(); ctx.ellipse(0,0,s*2.4,s*1.5,0,0,7); ctx.fill();
      }
      ctx.fillStyle=colorAt(p.f,t,a);
      ctx.beginPath(); ctx.ellipse(0,0,s,s*.55,0,0,7); ctx.fill();
      ctx.restore();
    }
  },
};

const MODES=[mParticles,mWaves,mRings,mMeteors,mFlies,mPetals];
let mode=mParticles;
function setMode(m){ mode=m; mode.reset(); $('#hint').textContent=m.hint; }

/* =============== persistence =============== */
function saveState(){
  try{
    localStorage.setItem('arviz-v1',JSON.stringify({
      mode:MODES.indexOf(mode), pal:PALETTES.indexOf(pal), palManual,
      scen:SCENERIES.indexOf(scen), flow, zoom,
      sens:+$('#sens').value, dens:+$('#dens').value,
    }));
  }catch(_){}
}
function loadState(){
  try{ return JSON.parse(localStorage.getItem('arviz-v1'))||{}; }
  catch(_){ return {}; }
}
function syncRow(row,idx){
  [...row.children].forEach((c,i)=>c.classList.toggle('on',i===idx));
}

/* =============== render loop =============== */
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  W=innerWidth; H=innerHeight;
  for(const c of [cv,bgc]){
    c.width=W*DPR; c.height=H*DPR;
    c.style.width=W+'px'; c.style.height=H+'px';
  }
  ctx.setTransform(DPR,0,0,DPR,0,0);
  paintScene(); mode.reset();
}
addEventListener('resize',resize);

let last=performance.now();
function frame(now){
  const t=now/1000, dt=Math.min(.05,(now-last)/1000); last=now;
  tickPerf(dt);
  updateAudio(t,dt,$('#sens').value/100);
  mode.step(dt,t);
  ctx.clearRect(0,0,W,H);
  if(scen.ambient)scen.ambient(ctx,t,W,H);
  ctx.globalCompositeOperation=lightScene?'source-over':'lighter';
  mode.draw(t);
  ctx.globalCompositeOperation='source-over';
  requestAnimationFrame(frame);
}

/* =============== gestures ===============
   tap = mode interaction; slow drag = stir/pull/spin/sweep/lead/steer;
   fast horizontal flick = flip flow direction; two fingers = pinch zoom.
   every interaction answers with a small haptic tick. */
const ptrs=new Map();
let pinch=null;
cv.addEventListener('pointerdown',e=>{
  cv.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY,x0:e.clientX,y0:e.clientY,
                        t0:performance.now(),moved:false});
  if(ptrs.size===2){
    const [a,b]=[...ptrs.values()];
    pinch={d0:Math.hypot(a.x-b.x,a.y-b.y)||1,z0:zoom};
  }
});
cv.addEventListener('pointermove',e=>{
  const p=ptrs.get(e.pointerId); if(!p)return;
  const dx=e.clientX-p.x, dy=e.clientY-p.y;
  p.x=e.clientX; p.y=e.clientY;
  if(Math.hypot(p.x-p.x0,p.y-p.y0)>14)p.moved=true;
  if(pinch&&ptrs.size===2){
    const [a,b]=[...ptrs.values()];
    zoom=Math.min(1.8,Math.max(.5,pinch.z0*Math.hypot(a.x-b.x,a.y-b.y)/pinch.d0));
    buzz(3);
    return;
  }
  if(p.moved&&mode.drag){ mode.drag(p.x,p.y,dx,dy); buzz(4); }
});
function endPtr(e){
  const p=ptrs.get(e.pointerId); if(!p)return;
  ptrs.delete(e.pointerId);
  if(pinch){ if(ptrs.size<2){pinch=null; buzz(6); saveState();} return; }
  const dt=(performance.now()-p.t0)/1000, tx=p.x-p.x0, ty=p.y-p.y0;
  if(!p.moved&&dt<.4){
    mode.tap(p.x,p.y);
    buzz(10);
  }else if(dt<.3&&Math.abs(tx)>80&&Math.abs(tx)>2.2*Math.abs(ty)){
    const nf=tx>0?1:-1;
    if(nf!==flow){
      flow=nf; syncRow($('#flowRow'),flow>0?0:1);
      toast(flow>0?'Flow →':'← Flow'); buzz([10,40,10]); saveState();
    }
  }
}
cv.addEventListener('pointerup',endPtr);
cv.addEventListener('pointercancel',endPtr);

/* =============== UI wiring =============== */
$('#gearBtn').addEventListener('click',()=>{ buzz(6); $('#sheet').classList.toggle('hidden'); });
$('#fsBtn').addEventListener('click',async()=>{
  buzz(6);
  try{
    if(document.fullscreenElement)await document.exitFullscreen();
    else await document.documentElement.requestFullscreen();
  }catch(e){ toast('Fullscreen not available in this browser'); }
});
function chipRow(rowEl,onPick){
  rowEl.addEventListener('click',e=>{
    const c=e.target.closest('.chip,.swatch'); if(!c)return;
    buzz(6);
    Promise.resolve(onPick(c)).then(ok=>{
      if(ok===false)return;
      for(const x of rowEl.children)x.classList.toggle('on',x===c);
      saveState();
    });
  });
}
chipRow($('#srcRow'),async c=>{
  if(c.dataset.src==='mic')return startMic();
  audio.mode='demo'; followLabel(); return true;
});
chipRow($('#flowRow'),c=>{ flow=+c.dataset.flow; return true; });

const palRow=$('#palRow');
for(const [i,p] of PALETTES.entries()){
  const b=document.createElement('button');
  b.className='chip'+(i===0?' on':'');
  b.innerHTML=`<span class="dot" style="background:${p.grad}"></span>${p.name}`;
  b.dataset.i=i; palRow.appendChild(b);
}
chipRow(palRow,c=>{ pal=PALETTES[+c.dataset.i]; palManual=true; return true; });

const modeRow=$('#modeRow');
for(const [i,m] of MODES.entries()){
  const b=document.createElement('button');
  b.className='chip'+(i===0?' on':''); b.textContent=m.name; b.dataset.i=i;
  modeRow.appendChild(b);
}
chipRow(modeRow,c=>{ setMode(MODES[+c.dataset.i]); return true; });

const bgRow=$('#bgRow');
for(const [i,s] of SCENERIES.entries()){
  const b=document.createElement('button');
  b.className='swatch'+(i===0?' on':''); b.title=s.name; b.setAttribute('aria-label',s.name);
  const tc=document.createElement('canvas'); tc.width=tc.height=88;
  const tcx=tc.getContext('2d');
  s.draw(tcx,88,88,false);                    // thumbnail is the real scenery painter
  if(s.ambient)s.ambient(tcx,0,88,88);        // plus a frozen frame of its ambient life
  b.style.backgroundImage=`url(${tc.toDataURL()})`;
  b.dataset.i=i; bgRow.appendChild(b);
}
chipRow(bgRow,c=>{ setScene(SCENERIES[+c.dataset.i]); return true; });

$('#dens').addEventListener('input',e=>{ density=e.target.value/100; saveState(); });
$('#sens').addEventListener('input',saveState);

/* keep the screen awake while visualizing */
let wakeLock=null;
async function keepAwake(){
  try{ wakeLock=await navigator.wakeLock.request('screen'); }catch(_){}
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden)keepAwake(); });
addEventListener('pointerdown',keepAwake,{once:true});

/* offline/installable app shell */
if('serviceWorker' in navigator&&location.protocol.startsWith('http'))
  addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

/* =============== boot =============== */
resize();
(function restore(){
  const s=loadState();
  if(s.dens!=null){ $('#dens').value=s.dens; density=s.dens/100; }
  if(s.sens!=null)$('#sens').value=s.sens;
  if(s.zoom!=null)zoom=s.zoom;
  if(s.flow!=null){ flow=s.flow; syncRow($('#flowRow'),flow>0?0:1); }
  palManual=!!s.palManual;
  if(palManual&&PALETTES[s.pal]){ pal=PALETTES[s.pal]; syncRow(palRow,s.pal); }
  if(SCENERIES[s.scen]){ setScene(SCENERIES[s.scen]); syncRow(bgRow,s.scen); }
  const m=MODES[s.mode]||mParticles;
  setMode(m); syncRow(modeRow,MODES.indexOf(m));
})();
followLabel();
requestAnimationFrame(frame);
</script>
</body>
</html>
