<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#05060c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARviz">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>ARviz</title>
</head>
<body>

<canvas id="bgc"></canvas>
<canvas id="amb"></canvas>
<canvas id="glc"></canvas>

<div class="fabs">
  <button class="fab" id="fsBtn" aria-label="Fullscreen" title="Fullscreen (F)">
    <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
  </button>
  <button class="fab" id="gearBtn" aria-label="Toggle settings" title="Settings (Space)">
    <svg viewBox="0 0 24 24"><path d="M4 8h10M18 8h2M4 16h4M12 16h8"/><circle cx="16" cy="8" r="2.2"/><circle cx="10" cy="16" r="2.2"/></svg>
  </button>
</div>

<div id="sheet">
  <div class="brand"><b>ARviz</b><span id="hint"></span><span id="follow"></span></div>
  <div>
    <div class="lbl">Scenery</div>
    <div class="row" id="bgRow"></div>
  </div>
  <div>
    <div class="lbl">Mode</div>
    <div class="row" id="modeRow"></div>
  </div>
  <div>
    <div class="lbl" id="cfgLbl">Mode settings</div>
    <div class="sliders" id="cfgRows"></div>
  </div>
  <div>
    <div class="lbl">Audio source</div>
    <div class="row" id="srcRow"></div>
  </div>
  <div>
    <div class="lbl">Flow direction</div>
    <div class="row" id="flowRow">
      <button class="chip on" data-flow="1">Forward &#8594;</button>
      <button class="chip" data-flow="-1">&#8592; Reverse</button>
    </div>
  </div>
  <div>
    <div class="lbl">Color cycle</div>
    <div class="row" id="palRow"></div>
  </div>
  <div class="sliders">
    <div class="sl"><span>Sensitivity</span><input type="range" id="sens" min="30" max="200" value="100"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
